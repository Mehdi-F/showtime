name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter test

      # offline-first lets the service worker precache the app shell so it can
      # still boot with no connection at all, not just tolerate a flaky one.
      # Flutter's generated service worker versions its own cache by content
      # hash (via flutter_service_worker.js + version.json), which is why the
      # old manual "?v=<sha>" query-string busting is gone: it rewrote the
      # same file references the service worker's manifest keys off of,
      # which would have fought the built-in versioning instead of helping it.
      - run: flutter build web --release --base-href /showtime/ --pwa-strategy=offline-first --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}

      - uses: peaceiris/actions-gh-pages@1ef5a1b1df4c63fe21a2242edbee6cac921ece01 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
