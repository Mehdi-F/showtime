name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build web --release --base-href /showtime/ --pwa-strategy=none --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}

      - name: Cache-bust JS asset references
        run: |
          cd build/web
          SHA_SHORT=${GITHUB_SHA::8}
          sed -i "s/main\.dart\.js/main.dart.js?v=$SHA_SHORT/g" flutter_bootstrap.js
          sed -i "s/flutter_bootstrap\.js\"/flutter_bootstrap.js?v=$SHA_SHORT\"/" index.html

      - uses: peaceiris/actions-gh-pages@1ef5a1b1df4c63fe21a2242edbee6cac921ece01 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
